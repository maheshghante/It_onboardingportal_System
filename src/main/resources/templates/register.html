<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>IT Onboarding Portal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', sans-serif;
            background:linear-gradient(to right, #eaf3ff, #f8fbff);
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        /* ================= HEADER ================= */

        .header{
            width:100%;
            background:rgb(255, 128, 128);
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:sticky;
            top:0;
            z-index:1000;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
        }

        /* ================= MENU ================= */

        .menu-container{
            position:relative;
        }

        .menu-icon{
            font-size:30px;
            cursor:pointer;
            user-select:none;
        }

        #menu-toggle{
            display:none;
        }

        .dropdown-menu{
            position:absolute;
            right:0;
            top:45px;
            background:white;
            width:180px;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            display:none;
        }

        .dropdown-menu a{
            display:block;
            padding:14px;
            text-decoration:none;
            color:#1e3a5f;
            font-weight:600;
            border-bottom:1px solid #eee;
            transition:0.3s;
        }

        .dropdown-menu a:hover{
            background:#f1f5ff;
        }

        #menu-toggle:checked ~ .dropdown-menu{
            display:block;
        }

        /* ================= MAIN CONTAINER ================= */

        .main-container{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .container{
            width:100%;
            max-width:520px;
            background:#ffffff;
            padding:40px;
            border-radius:18px;
            box-shadow:0 10px 35px rgba(0,0,0,0.10);
        }

        h1{
            text-align:center;
            color:#1e3a5f;
            margin-bottom:30px;
            font-size:30px;
            font-weight:700;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        label{
            font-size:15px;
            font-weight:600;
            color:#34495e;
            margin-bottom:6px;
            margin-top:14px;
        }

        input,
        select{
            width:100%;
            padding:13px 14px;
            border:1px solid #d6dce5;
            border-radius:10px;
            font-size:14px;
            background:#fafbfd;
            transition:0.3s;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#2d89ef;
            background:#fff;
            box-shadow:0 0 0 4px rgba(45,137,239,0.12);
        }

        .password-field:invalid{
            border-color:#e74c3c;
        }

        .password-field:valid{
            border-color:#27ae60;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:28px;
            border:none;
            border-radius:10px;
            background:#2d89ef;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1f6fd1;
            transform:translateY(-2px);
        }

        .login-text{
            text-align:center;
            margin-top:20px;
        }

        .login-text a{
            color:#2d89ef;
            text-decoration:none;
            font-weight:600;
        }

        /* ================= FOOTER ================= */

        .footer{
            background:#1e3a5f;
            color:white;
            padding:35px 20px;
            width:100%;
        }

        .footer-content{
            max-width:1200px;
            margin:auto;
            text-align:center;
        }

        .footer-content h3{
            font-size:24px;
            margin-bottom:10px;
        }

        .footer-content p{
            font-size:14px;
            margin:8px 0;
            color:#dcdcdc;
        }

        .footer-links{
            margin:20px 0;
        }

        .footer-links a{
            color:white;
            text-decoration:none;
            margin:0 15px;
            font-weight:600;
            transition:0.3s;
        }

        .footer-links a:hover{
            color:#74ebd5;
        }

        .copyright{
            margin-top:15px;
            font-size:13px;
            color:#bfbfbf;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:600px){

            .container{
                padding:25px;
            }

            h1{
                font-size:24px;
            }

            .logo{
                font-size:22px;
            }

            .footer-links a{
                display:block;
                margin:10px 0;
            }
			/* ================= ROLE SELECT ================= */

			.role-box{
			    width:100%;
			    margin-top:5px;
			}

			.role-select{
			    width:100%;
			    padding:13px 14px;
			    border:1px solid #d6dce5;
			    border-radius:10px;
			    font-size:14px;
			    background:#fafbfd;
			    color:#34495e;
			    cursor:pointer;
			    transition:0.3s;
			}

			.role-select:focus{
			    outline:none;
			    border-color:#2d89ef;
			    background:#fff;
			    box-shadow:0 0 0 4px rgba(45,137,239,0.12);
			}

			.role-select:hover{
			    border-color:#2d89ef;
			}
        }

    </style>

</head>

<body>

<!-- ================= HEADER ================= -->

<div class="header">

    <div class="logo">
        IT_Onboarding Portal
    </div>

    <!-- MENU -->
    <div class="menu-container">

        <input type="checkbox" id="menu-toggle">

        <label for="menu-toggle" class="menu-icon">
            ☰
        </label>

        <div class="dropdown-menu">

            <a th:href="@{/login}">
                Login
            </a>

            <a th:href="@{/register}">
                Register
            </a>

            <a th:href="@{/about}">
                About
            </a>

        </div>

    </div>

</div>

<!-- ================= FORM ================= -->

<div class="main-container">

    <div class="container">

        <h1>User Registration</h1>

        <form th:action="@{/users/register}"
              th:object="${user}"
              method="post">

            <!-- First Name -->
            <label>
                First Name
                <span style="color:red;">*</span>
            </label>

            <input type="text"
                   th:field="*{urFirstName}"
                   placeholder="Enter First Name"
                   required>

            <!-- Last Name -->
            <label>
                Last Name
                <span style="color:red;">*</span>
            </label>

            <input type="text"
                   th:field="*{urLastName}"
                   placeholder="Enter Last Name"
                   required>

            <!-- DOB -->
            <label>Date of Birth</label>

            <input type="date"
                   th:field="*{urDateofBirth}">

            <!-- Gender -->
            <label>
                Gender
                <span style="color:red;">*</span>
            </label>

            <select th:field="*{urGender}" required>

                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>

            </select>

            <!-- Email -->
            <label>
                Email
                <span style="color:red;">*</span>
            </label>

            <input type="email"
                   th:field="*{urEmail}"
                   placeholder="Enter Email"
                   required>

            <!-- Password -->
            <label>
                Password
                <span style="color:red;">*</span>
            </label>

            <input type="password"
                   th:field="*{urPassword}"
                   class="password-field"
                   placeholder="Enter Password"
                   required
                   pattern="^(?=(?:.*[A-Za-z]){2,})(?=(?:.*\d){3,})(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{14,}$"
                   title="Password must contain minimum 14 characters, 2 letters, 3 numbers and 1 special symbol">

            <!-- Phone -->
            <label>
                Phone Number
                <span style="color:red;">*</span>
            </label>

            <input type="text"
                   th:field="*{urPhoneNumber}"
                   placeholder="Enter 10 Digit Phone Number"
                   pattern="[0-9]{10}"
                   required>
				   <!-- Role -->
				   <label>
				       Role
				       <span style="color:red;">*</span>
				   </label>

				   <select th:field="*{role}" required>

				       <option value="">Select Role</option>

				       <option value="employee">
				           Employee
				       </option>

				       <option value="admin">
				           Admin
				       </option>

				   </select>

            <!-- Address -->
            <label>
                Address
                <span style="color:red;">*</span>
            </label>

            <input type="text"
                   th:field="*{urAdress}"
                   placeholder="Enter Address"
                   required>

            <!-- Login -->
            <div class="login-text">

                <p>
                    Already have an account?
                    <a th:href="@{/login}">
                        Login Here
                    </a>
                </p>

            </div>

            <!-- Button -->
            <button type="submit">
                Register User
            </button>

        </form>

    </div>

</div>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <div class="footer-content">

        <h3>IT_Onboarding Portal System</h3>

        <p>
            Streamlining employee onboarding with secure and smart management.
        </p>

        <div class="footer-links">

            <a th:href="@{/login}">Login</a>

            <a th:href="@{/register}">Register</a>

            <a th:href="@{/about}">About</a>

            <a th:href="@{/contact}">Contact</a>

        </div>

        <p class="copyright">
            © 2026 IT_Onboarding Portal System | All Rights Reserved
        </p>

    </div>

</footer>

</body>
</html>
