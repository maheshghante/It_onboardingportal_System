<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Department List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f4f7fa);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 85%;
            max-width: 900px;
            margin: 50px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
		table {
		    width: 100%;
		    border-collapse: collapse;
		    border: 1px solid #ccc;   /* outer border */
		}

		th, td {
		    padding: 12px;
		    text-align: center;
		    border: 1px solid #ccc;   /* row + column borders */
		}

		th {
		    background-color: #007bff;
		    color: white;
		}
        tr:hover {
            background-color: #f1f1f1;
        }

        .no-data {
            text-align: center;
            padding: 15px;
            color: #888;
        }

        .bottom-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-back {
            background-color: #6c757d;
        }

        .btn-add {
            background-color: #28a745;
        }

        .edit {
            background-color: #3498db;
            padding: 6px 10px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            margin-right: 5px;
        }

        .delete {
            background-color: #e74c3c;
            padding: 6px 10px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }

        .edit:hover, .delete:hover, .btn:hover {
            opacity: 0.85;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>Department List</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Modify</th>
        </tr>

        <tr th:if="${#lists.isEmpty(list)}">
            <td colspan="4" class="no-data">No Departments Found</td>
        </tr>

		<tr th:each="dept, stat : ${list}">

		    <!-- Serial Number -->
		    <td th:text="${stat.count}"></td>

		    <td th:text="${dept.departmentName}"></td>
		    <td th:text="${dept.description}"></td>

		    <td>
		        <a th:href="@{'/department/edit/' + ${dept.id}}" 
		           class="edit">
		           Edit
		        </a>

		        <a th:href="@{'/department/delete/' + ${dept.id}}"
		           class="delete"
		           onclick="return confirm('Are you sure you want to delete this department?');">
		           Delete
		        </a> 
		    </td>

		</tr>

    </table>

    <!-- Bottom Buttons --> 
    <div class="bottom-buttons">
        <a href="/department" class="btn btn-back">⬅ Back</a>
        <a href="/department" class="btn btn-add">+ Add New</a>
    </div>

</div>

</body>
</html>
