<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>User Details</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 75%;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: green;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 14px;
            text-align: center;
        }

        th {
            background-color: blue;
            color: white;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #f1f1f1;
        }

        .btn-container {
            text-align: center;
            margin-top: 20px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background-color: gray;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .back-btn:hover {
            background-color: black;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>User Created Successfully</h2>

    <table>

        <thead>

        <tr>
            <th>Id</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Phone Number</th>
            <th>Designation</th>
        </tr>

        </thead>

        <tbody>

        <tr>

            <td th:text="${user.urId}"></td>

            <td th:text="${user.urFirstName}"></td>

            <td th:text="${user.urLastName}"></td>

            <td th:text="${user.urEmail}"></td>

            <td th:text="${user.urPhoneNumber}"></td>

            <td th:text="${user.urDesignation}"></td>

        </tr>

        </tbody>

    </table>

    <div class="btn-container">

        <a th:href="@{/users}" class="back-btn">
            Back To User List
        </a>

    </div>

</div>

</body>

</html>
