<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>User Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        /* ================= HEADER ================= */

        header{
            background:#2c3e50;
            color:white;
            padding:18px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-size:16px;
            transition:0.3s;
        }

        nav a:hover{
            color:#3498db;
        }

        /* ================= LOGIN BOX ================= */

        .main-content{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .login-container {
            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            color:#333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
            box-shadow:0 0 5px rgba(52,152,219,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition:0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .register-text {
            text-align: center;
            margin-top: 20px;
        }

        .register-text a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .register-text a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: red;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* ================= FOOTER ================= */

        footer{
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:15px;
            font-size:14px;
        }

    </style>

</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <div class="logo">
        IT Onboarding Portal
    </div>

  

</header>

<!-- ================= MAIN CONTENT ================= -->

<div class="main-content">

    <div class="login-container">

        <h2>User Login Page</h2>

        <!-- Error Message -->
        <p class="error-msg"
           th:if="${error}"
           th:text="${error}">
        </p>

		<form th:action="@{/login}"
		      th:object="${user}"
		      method="post">

            <!-- Email -->
            <label for="email">
                Email
                <span style="color:red;">*</span>
            </label>

            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            <!-- Password -->
            <label for="password">
                Password
                <span style="color:red;">*</span>
            </label>

            <input type="password"
                   name="password"
                   id="password"
                   placeholder="Enter Password"
                   required
                   pattern="^(?=(?:.*[A-Za-z]){2,})(?=(?:.*\d){3,})(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{14,}$"
                   title="Password must contain minimum 14 characters, 2 letters, 3 numbers and 1 special symbol">

            <!-- Button -->
            <button type="submit">
                Login
            </button>

        </form>

        <!-- Register -->
        <div class="register-text">

            <p>
                Don't have an account?
                <a th:href="@{/register}">
                    Register Here
                </a>
            </p>

        </div>

    </div>

</div>

<!-- ================= FOOTER ================= -->

<footer>
    © 2026 IT Onboarding Portal System | All Rights Reserved
</footer>

</body>

</html>
