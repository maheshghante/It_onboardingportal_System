<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Role List</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f7fa;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th, td {
            padding: 14px;
            text-align: center;
            border: 1px solid #ddd;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #eafaf1;
        }

        .edit,
        .delete,
        .add-btn {
            display: inline-block;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin: 2px;
        }

        .edit {
            background-color: #3498db;
        }

        .delete {
            background-color: #e74c3c;
        }

        .add-btn {
            background-color: #27ae60;
        }

        .edit:hover,
        .delete:hover,
        .add-btn:hover {
            opacity: 0.85;
        }
		/* Action Buttons */
		.action-buttons {
		    display: flex;
		    justify-content: center;
		    align-items: center;
		    gap: 10px;
		}

		

		/* Delete Button */
		.delete-btn {
		    background-color: #e74c3c;
		}

		.delete-btn:hover {
		    background-color: #c0392b;
		    transform: scale(1.05);
		}
		.edit {
		    background-color: #3498db;
		    padding: 6px 10px;
		    border-radius: 5px;
		    color: white;
		    text-decoration: none;
		    margin-right: 5px;
		}

		.delete {
		    background-color: #e74c3c;
		    padding: 6px 10px;
		    border-radius: 5px;
		    color: white;
		    text-decoration: none;
		}

		.edit:hover,
		.delete:hover {
		    opacity: 0.85;
		}

    </style>
</head>

<body>

<div class="container">

    <h2>Role List</h2>

    <table>

        <thead>
            <tr>
                <th>Role ID</th>
                <th>Role Name</th>
                <th>Role Description</th>
                <th>Modify</th>
            </tr>
        </thead>

		<tbody>

		    <tr th:each="role, roleStat : ${roles}">

		        <!-- Serial Number -->
		        <td th:text="${roleStat.count}"></td>

		        <td th:text="${role.roleName}"></td>
		        <td th:text="${role.roleDescription}"></td>

		        <td class="action-buttons">

		            <!-- UPDATE -->
		            <a th:href="@{'/role/update/' + ${role.roleId}}"
		               class="edit">
		               Edit
		            </a>

		            <!-- DELETE -->
		            <a th:href="@{'/role/delete/' + ${role.roleId}}"
		               class="delete"
		               onclick="return confirm('Are you sure you want to delete this role?');">
		               Delete
		            </a>

		        </td>

		    </tr>

		</tbody>
    </table>

    <!-- ADD NEW ROLE -->
    <a th:href="@{/role}" class="add-btn">
        Add New Role
    </a>

</div>

</body>
</html>
