<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Department Form</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f8fafc);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e293b;
            font-size: 30px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #334155;
            font-size: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.3s;
            background-color: #f8fafc;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            background-color: #fff;
            box-shadow: 0 0 8px rgba(37,99,235,0.2);
        }

        textarea {
            resize: none;
            height: 110px;
        }

        .all-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.92;
        }

        /* Button Colors */

        .submit {
            background: #2563eb;
        }

        .cancel {
            background: #ef4444;
        }

        .back {
            background: #64748b;
        }

        .list-btn {
            background: #16a34a;
        }

        /* Responsive */

        @media(max-width: 500px){

            .container{
                padding:25px;
            }

            .all-btns{
                grid-template-columns:1fr;
            }

            h2{
                font-size:24px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Department Form</h2>

    <form th:action="@{/saveDepartment}" th:object="${department}" method="post">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{id}" />

        <label>Department Name<span style="color:red;">*</span></label>
        <input type="text"
               th:field="*{departmentName}"
               placeholder="Enter Department Name"
               required>

        <label>Description</label>
        <textarea th:field="*{description}"
                  placeholder="Enter Department Description"
                  required></textarea>

        <!-- Buttons -->
        <div class="all-btns">

            <button type="submit" class="btn submit">
                Submit
            </button>

            <button type="reset" class="btn cancel">
                Cancel
            </button>

            <a th:href="@{/dashboard}" class="btn btn back">
                Back
            </a>

            <a th:href="@{/departmentList}" class="btn list-btn">
                View Department List
            </a>

        </div>

    </form>

</div>

</body>
</html>
