<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Update Department</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f4f7fa);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Update Department</h2>

    <form th:action="@{/department/update}"
          th:object="${department}"
          method="post">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{id}">

        <!-- Department Name -->
        <input type="text"
               th:field="*{departmentName}"
               placeholder="Enter Department Name">

        <!-- Description -->
        <textarea th:field="*{description}"
                  placeholder="Enter Description"></textarea>

        <button type="submit">
            Update Department
        </button>

    </form>

</div>

</body>
</html>
