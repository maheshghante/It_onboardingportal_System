<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

h1{
    text-align:center;
    margin-top:30px;
    color:#2c3e50;
}

table{
    width:90%;
    margin:30px auto;
    border-collapse:collapse;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    border-radius:10px;
    overflow:hidden;
}

table th{
    background:#3498db;
    color:white;
    padding:15px;
    text-align:center;
}

table td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

table tr:hover{
    background:#f2f7ff;
}

.edit-btn{
    background:#2ecc71;
    color:white;
    padding:8px 15px;
    text-decoration:none;
    border-radius:6px;
    margin-right:8px;
    font-size:14px;
}

.edit-btn:hover{
    background:#27ae60;
}

.delete-btn{
    background:#e74c3c;
    color:white;
    padding:8px 15px;
    text-decoration:none;
    border-radius:6px;
    font-size:14px;
}

.delete-btn:hover{
    background:#c0392b;
}

.container{
    text-align:center;
    margin:30px;
}

.back-btn{
    background:#34495e;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:8px;
    font-size:15px;
}

.back-btn:hover{
    background:#2c3e50;
}

@media screen and (max-width:768px){

table{
    width:98%;
    font-size:13px;
}

.edit-btn,
.delete-btn{
    display:block;
    margin:5px auto;
}

}

</style>






<h1>User List</h1>

<table>

<tr>
    <th>ID</th>
    <th>First Name</th>
    <th>Last Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Department</th>
    <th>Role</th>
    <th>Action</th>
</tr>

<tr th:each="user : ${users}">
    <td th:text="${user.urId}"></td>
    <td th:text="${user.urFirstName}"></td>
    <td th:text="${user.urLastName}"></td>
    <td th:text="${user.urEmail}"></td>
    <td th:text="${user.urPhoneNumber}"></td>
    <td th:text="${user.urDepartment}"></td>
    <td th:text="${user.role}"></td>

    <td>
        <a th:href="@{/user/update/{id}(id=${user.urId})}" 
           class="edit-btn">
            Edit
        </a>

        <a th:href="@{/user/delete/{id}(id=${user.urId})}" 
           class="delete-btn"
           onclick="return confirm('Are you sure want to delete?')">
            Delete
        </a>
    </td>
</tr>

</table>

<div class="container">
    <a th:href="@{/dashboard}" class="back-btn">
        Back Dashboard
    </a>
</div>
