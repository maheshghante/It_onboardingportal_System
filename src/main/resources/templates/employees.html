<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Employees</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    padding:40px;
}

.container{
    width:100%;
    max-width:1200px;
    margin:auto;
}

.heading{
    text-align:center;
    margin-bottom:30px;
}

.heading h1{
    color:#1e293b;
    font-size:36px;
}

.table-container{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#2563eb;
    color:white;
}

thead th{
    padding:15px;
    font-size:16px;
}

tbody tr{
    transition:0.3s;
}

tbody tr:nth-child(even){
    background:#f8fafc;
}

tbody tr:hover{
    background:#dbeafe;
}

tbody td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #e2e8f0;
    color:#334155;
    font-size:15px;
}

.no-data{
    text-align:center;
    padding:20px;
    color:red;
    font-size:18px;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    padding:10px 20px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

.back-btn:hover{
    background:#1d4ed8;
}

.update-btn{
    padding:8px 14px;
    background:#16a34a;
    color:white;
    text-decoration:none;
    border-radius:6px;
    margin-right:8px;
}

.update-btn:hover{
    background:#15803d;
}

.delete-btn{
    padding:8px 14px;
    background:#dc2626;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.delete-btn:hover{
    background:#b91c1c;
}

</style>

</head>

<body>

<div class="container">

    <a href="/hr_dashboard" class="back-btn">← Back</a>

    <div class="heading">
        <h1>Employee Data</h1>
    </div>

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone No</th>
                    <th>Role</th>
                    <th>Department</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="emp : ${employees}">

                    <td th:text="${emp.urId}"></td>

                    <td th:text="${emp.urFirstName}"></td>

                    <td th:text="${emp.urLastName}"></td>

                    <td th:text="${emp.urEmail}"></td>

                    <td th:text="${emp.urPhoneNumber}"></td>

                    <!-- Correct Role Field -->
                    <td th:text="${emp.role}"></td>

                   <td th:text="${emp.urDepartment}"></td>

                    <td>

                        <a th:href="@{/updateEmployee/{id}(id=${emp.urId})}" 
                           class="update-btn">
                           Start Onboarding
                        </a>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(employees)}">

                    <td colspan="8" class="no-data">
                        No Employee Data Found
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
