<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Update Employee</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f5f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

/* Form container */
.form-container{
    width:100%;
    max-width:500px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.form-container h1{
    text-align:center;
    margin-bottom:30px;
    color:#1e293b;
}

/* Input group */
.input-group{
    margin-bottom:20px;
    display:flex;
    flex-direction:column;
}

/* Label */
.input-group label{
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

/* Input + Select */
.input-group input,
.input-group select{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:15px;
    transition:0.3s;
    background:#fff;
}

/* Focus */
.input-group input:focus,
.input-group select:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,0.4);
}

/* Button */
.btn{
    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#1d4ed8;
}

/* Back button */
.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:white;
    background:#64748b;
    padding:10px 18px;
    border-radius:8px;
    transition:0.3s;
}

.back-btn:hover{
    background:#475569;
}

</style>
</head>

<body>

<div class="form-container">

    <a href="/employees" class="back-btn">← Back</a>

    <h1>Update Employee</h1>

    <form action="/saveEmployee" method="post">

        <input type="hidden" 
               name="urId"
               th:value="${employee.urId}">

        <div class="input-group">
            <label>First Name<span style="color:red;">*</span></label>
            <input type="text" 
                   name="urFirstName"
                   th:value="${employee.urFirstName}">
        </div>

        <div class="input-group">
            <label>Last Name<span style="color:red;">*</span></label>
            <input type="text" 
                   name="urLastName"
                   th:value="${employee.urLastName}">
        </div>

        <div class="input-group">
            <label>Email<span style="color:red;">*</span></label>
            <input type="email" 
                   name="urEmail"
                   th:value="${employee.urEmail}">
        </div>

        <div class="input-group">
            <label>Phone Number<span style="color:red;">*</span></label>
            <input type="text" 
                   name="urPhoneNumber"
                   th:value="${employee.urPhoneNumber}">
        </div>
		
		
		<div class="input-group">
		    <label>Role<span style="color:red;">*</span></label>

		    <select name="role">
		        <option value="">-- Select Role --</option>
		        <option value="Admin" th:selected="${employee.role == 'Admin'}">Admin</option>
		        <option value="Employee" th:selected="${employee.role == 'Employee'}">Employee</option>
		        <option value="Manager" th:selected="${employee.role == 'Manager'}">Manager</option>
		    </select>
		</div>


		<div class="input-group">
		    <label>Department<span style="color:red;">*</span></label>

		    <select name="urDepartment">
		        <option value="">-- Select Department --</option>
		        <option value="IT" th:selected="${employee.urDepartment == 'IT'}">IT</option>
		        <option value="HR" th:selected="${employee.urDepartment == 'HR'}">HR</option>
		        <option value="Finance" th:selected="${employee.urDepartment == 'Finance'}">Finance</option>
		        <option value="Sales" th:selected="${employee.urDepartment == 'Sales'}">Sales</option>
		    </select>
		</div>
		
		<div class="input-group">
		    <label>Designation<span style="color:red;">*</span></label>

		    <input type="text"
		           name="urDesignation"
		           th:value="${employee.urDesignation}">
		</div>
		
		
		<div class="input-group">
		    <label>Joining Date<span style="color:red;">*</span></label>

		    <input type="date"
		           name="urJoiningDate"
		           th:value="${employee.urJoiningDate}">
		</div>
		
		
		
		<div class="input-group">
		    <label>Location<span style="color:red;">*</span></label>

				    <input type="text"
				           name="urLocation"
				           th:value="${employee.urLocation}">
				</div>
		
		
		
	
        <button type="submit" class="btn">
            Update Employee
        </button>

    </form>

</div>

</body>
</html>
